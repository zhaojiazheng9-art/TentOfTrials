name: Feature request
description: Suggest an improvement or new capability for TentOfTrials
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What are you proposing?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve, and who benefits?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Describe the expected behavior, API, UI, or implementation direction.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, tradeoffs, or reasons not to do this.
    validations:
      required: false
  - type: textarea
    id: affected_modules
    attributes:
      label: Affected modules
      description: Which parts of the repo would this likely touch?
    validations:
      required: false
