name: Bug report
description: Report a reproducible problem in TentOfTrials
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please include enough detail for someone else to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal reproduction path.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, toolchain versions, browser/runtime versions, and affected module(s).
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or diagnostic output
      description: Paste relevant logs, stack traces, or attach a diagnostic build log if available.
      render: shell
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Screenshots, links, suspected cause, or related issues.
    validations:
      required: false
